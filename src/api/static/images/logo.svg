<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="85" r="70" fill="#1E9FD8"/>
  
  <!-- Robot Head -->
  <path d="M100 40 L100 50" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <circle cx="100" cy="40" r="6" fill="white"/>
  
  <!-- Robot Face -->
  <rect x="65" y="60" width="70" height="50" rx="25" fill="white"/>
  <rect x="70" y="70" width="60" height="35" rx="17.5" fill="#0F2942"/>
  
  <!-- Robot Eyes -->
  <circle cx="85" cy="87" r="8" fill="#1E9FD8"/>
  <circle cx="115" cy="87" r="8" fill="#1E9FD8"/>
  
  <!-- Robot Smile -->
  <path d="M 90 95 Q 100 100 110 95" stroke="#1E9FD8" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Robot Ears -->
  <rect x="55" y="75" width="10" height="20" rx="5" fill="white"/>
  <rect x="135" y="75" width="10" height="20" rx="5" fill="white"/>
  
  <!-- Landmarks Silhouette -->
  <g transform="translate(40, 110)">
    <!-- Colosseum -->
    <path d="M 5 30 L 5 10 Q 5 5 10 5 L 25 5 Q 30 5 30 10 L 30 30" fill="#0F2942"/>
    <rect x="7" y="12" width="4" height="8" fill="#1E9FD8"/>
    <rect x="13" y="12" width="4" height="8" fill="#1E9FD8"/>
    <rect x="19" y="12" width="4" height="8" fill="#1E9FD8"/>
    <rect x="25" y="12" width="4" height="8" fill="#1E9FD8"/>
    
    <!-- Eiffel Tower -->
    <path d="M 50 30 L 45 10 L 47 10 L 50 2 L 53 10 L 55 10 L 50 30" fill="#0F2942"/>
    
    <!-- Big Ben -->
    <rect x="75" y="15" width="12" height="15" fill="#0F2942"/>
    <path d="M 75 15 L 81 5 L 87 15" fill="#0F2942"/>
    <rect x="78" y="17" width="6" height="4" fill="#1E9FD8"/>
    
    <!-- Mountain/Pyramid -->
    <path d="M 105 30 L 95 15 L 100 5 L 105 15 L 115 30" fill="#0F2942"/>
    
    <!-- Path/Road -->
    <path d="M 0 35 Q 60 32 120 35" stroke="white" stroke-width="4" fill="none"/>
  </g>
</svg>
