<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Same-hue vertical gradient: lighter sky on top, base blue, deeper blue at the base -->
    <linearGradient id="badge" x1="100" y1="8" x2="100" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3BB4E6"/>
      <stop offset="0.55" stop-color="#1E9FD8"/>
      <stop offset="1" stop-color="#1687C1"/>
    </linearGradient>
    <clipPath id="badgeClip">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>

  <!-- Badge -->
  <circle cx="100" cy="100" r="95" fill="url(#badge)"/>

  <!-- City skyline at the base of the badge -->
  <g clip-path="url(#badgeClip)">
    <!-- Ground -->
    <rect x="0" y="158" width="200" height="42" fill="#0F2942"/>

    <!-- Colosseum -->
    <path d="M44 158 V142 Q44 136 50 136 H63 Q69 136 69 142 V158 Z" fill="#0F2942"/>
    <rect x="48" y="146" width="3.5" height="9" rx="1.2" fill="#5CC0EA"/>
    <rect x="54.75" y="146" width="3.5" height="9" rx="1.2" fill="#5CC0EA"/>
    <rect x="61.5" y="146" width="3.5" height="9" rx="1.2" fill="#5CC0EA"/>

    <!-- Eiffel Tower -->
    <path d="M88 121 L83.5 141 L78 158 L83.5 158 L85.5 148 L90.5 148 L92.5 158 L98 158 L92.5 141 Z" fill="#0F2942"/>

    <!-- Big Ben -->
    <path d="M104 132 L112 119 L120 132 Z" fill="#0F2942"/>
    <rect x="106" y="131" width="12" height="27" fill="#0F2942"/>
    <rect x="108.5" y="135" width="7" height="7" rx="1.5" fill="#5CC0EA"/>

    <!-- Domed hall -->
    <rect x="128" y="141" width="26" height="17" fill="#0F2942"/>
    <path d="M128 141 Q141 122 154 141 Z" fill="#0F2942"/>
    <rect x="139" y="116" width="4" height="8" rx="1.5" fill="#0F2942"/>
    <circle cx="141" cy="115" r="2.4" fill="#0F2942"/>
    <rect x="132" y="146" width="4" height="8" rx="1.3" fill="#5CC0EA"/>
    <rect x="139" y="146" width="4" height="8" rx="1.3" fill="#5CC0EA"/>
    <rect x="146" y="146" width="4" height="8" rx="1.3" fill="#5CC0EA"/>
  </g>

  <!-- Robot guide -->
  <!-- Antenna -->
  <line x1="100" y1="50" x2="100" y2="38" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <circle cx="100" cy="34" r="5.5" fill="#FFFFFF"/>
  <circle cx="100" cy="34" r="2.2" fill="#1E9FD8"/>

  <!-- Ears -->
  <rect x="53" y="72" width="9" height="20" rx="4.5" fill="#FFFFFF"/>
  <rect x="138" y="72" width="9" height="20" rx="4.5" fill="#FFFFFF"/>

  <!-- Head -->
  <rect x="62" y="50" width="76" height="60" rx="27" fill="#FFFFFF"/>

  <!-- Face screen -->
  <rect x="71" y="60" width="58" height="38" rx="17" fill="#0F2942"/>

  <!-- Eyes -->
  <circle cx="86" cy="79" r="8" fill="#1E9FD8"/>
  <circle cx="114" cy="79" r="8" fill="#1E9FD8"/>
  <circle cx="83.2" cy="76.2" r="2.4" fill="#FFFFFF"/>
  <circle cx="111.2" cy="76.2" r="2.4" fill="#FFFFFF"/>

  <!-- Smile -->
  <path d="M87 89 Q100 98 113 89" stroke="#1E9FD8" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Rim highlight -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="1.5"/>
</svg>
