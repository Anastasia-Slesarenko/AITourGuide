server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ------------------------------------------------------------------
  # Логи FastAPI-контейнера (stdout/stderr через Docker)
  # ------------------------------------------------------------------
  - job_name: aitourguide_api
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Docker SD возвращает имя контейнера с префиксом "/", фильтруем через regex
      - source_labels: [__meta_docker_container_name]
        regex: "^/?aitourguide_api$"
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: "^/?(.*)"
        target_label: container
        replacement: "$1"
      - source_labels: [__meta_docker_container_image]
        target_label: image
      - replacement: aitourguide
        target_label: app
      - replacement: api
        target_label: service
    pipeline_stages:
      # Шаг 1: обрабатываем только строки, начинающиеся с '{' (JSON-логи).
      # Строки plain-text (uvicorn access log, stack traces) пропускаются
      # без изменений — они попадут в Loki как есть, без ошибок парсинга.
      - match:
          selector: '{service="api"} |~ "^\\{"'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
                  message: message
                  correlation_id: correlation_id
                  ts: timestamp
            - labels:
                level:
                logger:
            # Go reference time: Mon Jan 2 15:04:05.999999999 MST 2006
            - timestamp:
                source: ts
                format: "2006-01-02T15:04:05.999999999Z07:00"
                fallback_formats:
                  - "2006-01-02T15:04:05Z07:00"
                  - "2006-01-02T15:04:05Z"
            - output:
                source: message

  # ------------------------------------------------------------------
  # Логи SGLang-контейнера (plain text)
  # ------------------------------------------------------------------
  - job_name: aitourguide_sglang
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "^/?aitourguide_sglang$"
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: "^/?(.*)"
        target_label: container
        replacement: "$1"
      - replacement: aitourguide
        target_label: app
      - replacement: sglang
        target_label: service
