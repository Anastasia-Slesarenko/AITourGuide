server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 5s
    batchsize: 1048576

scrape_configs:

  - job_name: docker_files
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    # Периодический опрос файлов вместо inotify
    # (inotify не работает для overlay2 filesystem внутри контейнера)
    decompression:
      enabled: false
    file_watch_config:
      min_poll_frequency: 1s
      max_poll_frequency: 5s

    pipeline_stages:
      - json:
          expressions:
            log_line: log
            stream: stream
      - output:
          source: log_line
      - labels:
          stream:
      - json:
          expressions:
            level: level
            logger: logger
      - labels:
          level:
          logger:
