server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ------------------------------------------------------------------
  # Все Docker-контейнеры — без фильтрации на уровне SD.
  # Labels добавляются через relabel_configs.
  # ------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # container — имя без ведущего "/"
      - source_labels: [__meta_docker_container_name]
        regex: "/?(.+)"
        target_label: container
        replacement: "$1"

      # job — всегда "docker"
      - target_label: job
        replacement: docker

    pipeline_stages:
      # Для контейнера api пробуем извлечь level и logger из JSON.
      # Строки где JSON не парсится — попадают в Loki как есть (без labels level/logger).
      # output НЕ переопределяем — в Loki идёт оригинальная строка лога.
      - match:
          selector: '{container="aitourguide_api"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
            - labels:
                level:
                logger:
