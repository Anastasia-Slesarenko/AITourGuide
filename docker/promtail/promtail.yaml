server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /run/promtail/positions.yaml
  # Синхронизируем позиции каждые 10 секунд
  sync_period: 10s

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 5s
    batchsize: 1048576

scrape_configs:

  - job_name: docker_files
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            log_line: log
            stream: stream
      - output:
          source: log_line
      - labels:
          stream:
      - json:
          expressions:
            level: level
            logger: logger
      - labels:
          level:
          logger:
