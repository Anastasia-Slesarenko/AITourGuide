server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ------------------------------------------------------------------
  # Читаем лог-файлы Docker-контейнеров напрямую с хоста.
  # Docker SD даёт метаданные (имя контейнера, image),
  # __path__ указывает на json-file лог на хосте.
  # ------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Путь к лог-файлу контейнера на хосте (json-file driver)
      - source_labels: [__meta_docker_container_id]
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log

      # container — имя без ведущего "/"
      - source_labels: [__meta_docker_container_name]
        regex: "/?(.+)"
        target_label: container
        replacement: "$1"

      # job label
      - target_label: job
        replacement: docker

    pipeline_stages:
      # Каждая строка в json-file — это JSON вида:
      # {"log":"...\n","stream":"stdout","time":"..."}
      # Сначала извлекаем поле "log" как новый текст строки
      - json:
          expressions:
            log_line: log
      - output:
          source: log_line

      # Для контейнера api парсим наш JSON-лог внутри поля log
      - match:
          selector: '{container="aitourguide_api"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
            - labels:
                level:
                logger:
