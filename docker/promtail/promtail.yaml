server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ------------------------------------------------------------------
  # Логи FastAPI-контейнера (stdout/stderr через Docker)
  # ------------------------------------------------------------------
  - job_name: aitourguide_api
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Docker SD возвращает имя контейнера с префиксом "/", фильтруем через regex
      - source_labels: [__meta_docker_container_name]
        regex: "^/?aitourguide_api$"
        action: keep
      - source_labels: [__meta_docker_container_name]
        # Убираем ведущий "/" из имени контейнера
        regex: "^/?(.*)"
        target_label: container
        replacement: "$1"
      - source_labels: [__meta_docker_container_image]
        target_label: image
      - replacement: aitourguide
        target_label: app
      - replacement: api
        target_label: service
    pipeline_stages:
      # Парсим JSON-логи (LOG_FORMAT=json в продакшене)
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            correlation_id: correlation_id
            ts: timestamp
      # Устанавливаем уровень лога как label для фильтрации в Grafana
      - labels:
          level:
          logger:
      # Используем timestamp из лога, а не время получения
      # Go reference time: Mon Jan 2 15:04:05 MST 2006
      - timestamp:
          source: ts
          format: "2006-01-02T15:04:05.999999999Z07:00"
          fallback_formats:
            - "2006-01-02T15:04:05Z07:00"
            - "2006-01-02T15:04:05Z"
      # Выводим message как основной текст записи
      - output:
          source: message

  # ------------------------------------------------------------------
  # Логи SGLang-контейнера (plain text)
  # ------------------------------------------------------------------
  - job_name: aitourguide_sglang
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "^/?aitourguide_sglang$"
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: "^/?(.*)"
        target_label: container
        replacement: "$1"
      - replacement: aitourguide
        target_label: app
      - replacement: sglang
        target_label: service
