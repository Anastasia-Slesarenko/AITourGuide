apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
      spanBar:
        type: "Tag"
        tag: "http.url"
      # Связь трейсов с метриками Prometheus
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: "service.name"
            value: "service"
        queries:
          - name: "Request rate"
            query: "rate(aitourguide_requests_total{$$__tags}[5m])"
          - name: "Error rate"
            query: "rate(aitourguide_requests_total{status='error',$$__tags}[5m])"
