apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Извлекаем correlation_id из JSON-лога и создаём ссылку для поиска
        # по всем событиям одного запроса в Loki Explore
        - name: correlation_id
          matcherRegex: '"correlation_id":"([^"]+)"'
          # internalLinkEnabled=true → ссылка открывает Loki Explore, а не внешний URL
          internalLinkEnabled: true
          datasourceUid: loki
          url: '{app="aitourguide"} | json | correlation_id="${__value.raw}"'
          urlDisplayLabel: "Найти по correlation_id"
    version: 1
    editable: false
