global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "aitourguide"

scrape_configs:
  # FastAPI /metrics
  - job_name: "aitourguide_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
